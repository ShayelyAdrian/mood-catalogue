<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOOD — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#0a0a0a;
    --bg-soft:#141414;
    --card:#161616;
    --card-border:#262626;
    --ink:#f3f1ec;
    --ink-dim:#9a9a96;
    --accent:#e8197f;
    --accent-soft:#3a1326;
    --line:#262626;
    --radius:2px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);color:var(--ink);}
  body{
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
  }
  .display{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.04em;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea{font-family:inherit;color:inherit;background:none;}

  /* ---------- Announcement bar ---------- */
  .announcement-bar{
    background:#000000;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
    padding:9px 0;
    position:relative;
    border-bottom:1px solid #262626;
  }
  .announcement-track{
    display:inline-flex;
    animation:announcementScroll 18s linear infinite;
  }
  .announcement-track span{
    display:inline-block;
    padding:0 32px;
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .announcement-track img.emoji{
    height:1.1em;width:1.1em;
    vertical-align:-0.18em;
    margin:0 0.05em;
  }
  @keyframes announcementScroll{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce){
    .announcement-track{animation:none;}
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 24px;
    background:rgba(10,10,10,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{height:42px;width:auto;display:block;}
  .brand-name{font-family:'Bebas Neue';font-size:22px;letter-spacing:0.12em;}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .pill{
    font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    padding:7px 14px;border:1px solid var(--line);border-radius:20px;
    color:var(--ink-dim);transition:all .2s;
  }
  .pill:hover{border-color:var(--accent);color:var(--ink);}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* ---------- Category filter bar ---------- */
  .filter-bar{
    display:flex;gap:10px;flex-wrap:wrap;
    padding:28px 0 8px;
  }
  .chip{
    font-size:12px;letter-spacing:0.05em;text-transform:uppercase;font-weight:600;
    padding:9px 18px;border:1px solid var(--line);border-radius:20px;
    color:var(--ink-dim);transition:all .2s;
  }
  .chip:hover{border-color:var(--ink-dim);color:var(--ink);}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#0a0a0a;}

  /* --- Panel dueño: topbar compacto --- */
  .owner-topbar{ flex-wrap:nowrap; }
  .owner-badge{
    font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
    background:var(--accent);color:#fff;padding:3px 8px;border-radius:20px;margin-left:8px;
  }
  .owner-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .owner-config-wrap{position:relative;}
  .owner-config-btn{
    display:flex;align-items:center;gap:6px;
    font-size:12px;font-weight:600;letter-spacing:0.04em;
    padding:8px 14px;border-radius:2px;
    background:var(--card);border:1px solid var(--card-border);color:var(--ink);
    cursor:pointer;transition:border-color .15s;white-space:nowrap;
  }
  .owner-config-btn svg{width:14px;height:14px;flex-shrink:0;}
  .owner-config-btn:hover{border-color:var(--accent);}
  .owner-config-menu{
    position:absolute;top:calc(100% + 6px);right:0;
    background:var(--card);border:1px solid var(--card-border);border-radius:4px;
    min-width:190px;z-index:100;
    display:none;flex-direction:column;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);overflow:hidden;
  }
  .owner-config-menu.open{display:flex;}
  .config-item{
    padding:11px 16px;font-size:13px;text-align:left;
    color:var(--ink);cursor:pointer;background:none;border:none;
    transition:background .15s;letter-spacing:0.01em;
    border-bottom:1px solid var(--line);
  }
  .config-item:last-child{border-bottom:none;}
  .config-item:hover{background:var(--bg-soft);color:var(--accent);}
  .owner-action-btn{
    font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
    padding:8px 14px;border-radius:2px;cursor:pointer;border:none;white-space:nowrap;
    transition:all .15s;text-align:center;
  }
  .owner-action-btn.secondary{
    background:transparent;border:1px solid var(--card-border);color:var(--ink-dim);
  }
  .owner-action-btn.secondary:hover{border-color:var(--ink-dim);color:var(--ink);}
  .owner-action-btn.danger{background:#1a0a0a;color:#e85050;border:1px solid #3a1010;}
  .owner-action-btn.danger:hover{background:#e85050;color:#fff;}
  @media(max-width:700px){
    .owner-config-btn span{display:none;}
    .owner-action-btn span{display:none;}
    .owner-badge{display:none;}
  }
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 13px;background:var(--bg-soft);border:1px solid var(--card-border);
    border-radius:2px;margin-bottom:8px;font-size:13px;
  }

  .hero-bg-preview-wrap{
    width:100%;aspect-ratio:16/7;border-radius:2px;overflow:hidden;
    background:var(--bg-soft);border:1px solid var(--card-border);
    margin-bottom:6px;display:flex;align-items:center;justify-content:center;
  }
  .hero-bg-preview{width:100%;height:100%;object-fit:cover;}
  .hero-bg-preview-empty{font-size:12px;color:var(--ink-dim);text-align:center;padding:20px;}

  /* Múltiples imágenes en modal de producto */
  .multi-img-grid{
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;
  }
  .multi-img-item{
    position:relative;width:72px;height:72px;border-radius:2px;overflow:hidden;
    border:2px solid var(--accent);flex-shrink:0;
  }
  .multi-img-item img{width:100%;height:100%;object-fit:cover;}
  .multi-img-badge{
    position:absolute;bottom:0;left:0;right:0;
    font-size:9px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
    background:var(--accent);color:#fff;text-align:center;padding:2px 0;
  }
  .multi-img-remove{
    position:absolute;top:2px;right:2px;
    width:18px;height:18px;border-radius:50%;
    background:rgba(0,0,0,0.7);color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;
  }
  .multi-img-remove svg{width:10px;height:10px;}
  .multi-img-add{
    width:72px;height:72px;border-radius:2px;
    border:1px dashed var(--card-border);
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-dim);cursor:pointer;transition:border-color .15s;flex-shrink:0;
  }
  .multi-img-add:hover{border-color:var(--accent);color:var(--ink);}
  .multi-img-add svg{width:20px;height:20px;}
  .preset-thumbs-row{
    display:flex;gap:6px;flex-wrap:wrap;
  }
  .preset-thumb{
    width:56px;height:56px;object-fit:cover;border-radius:2px;cursor:pointer;
    border:2px solid transparent;transition:all .15s;opacity:0.8;
  }
  .preset-thumb:hover{opacity:1;border-color:var(--ink-dim);}
  .preset-thumb.used{border-color:var(--accent);opacity:1;}

  /* ---------- Hero ---------- */
  /* ---------- Hero (streetwear redesign v2) ---------- */
  .hero{
    position:relative;
    padding:0;
    border-bottom:1px solid var(--line);
    overflow:hidden;
    background:#070707;
    min-height:600px;
  }
  .hero-bg{
    position:absolute;inset:0;width:100%;height:100%;
  }
  .hero-bg-image{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:center;
  }
  .hero-bg-overlay{
    position:absolute;inset:0;
    background:linear-gradient(90deg, rgba(7,7,7,0.92) 0%, rgba(7,7,7,0.55) 40%, rgba(7,7,7,0.25) 70%, rgba(7,7,7,0.45) 100%),
               linear-gradient(180deg, rgba(7,7,7,0.3) 0%, rgba(7,7,7,0) 18%, rgba(7,7,7,0) 75%, rgba(7,7,7,0.55) 100%);
  }
  .hero-nav{
    position:relative;z-index:5;
    display:flex;align-items:center;justify-content:flex-end;gap:32px;
    padding:24px 32px 0;
    font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-dim);
  }
  .hero-nav span{color:var(--ink);}
  .hero-nav .globe{width:18px;height:18px;color:var(--ink-dim);}

  .hero-stage{
    position:relative;z-index:2;
    padding:56px 32px 40px 64px;
    min-height:520px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .hero-vertical{
    position:absolute;left:18px;top:90px;bottom:90px;
    display:flex;align-items:center;
    writing-mode:vertical-rl;
    font-size:10px;letter-spacing:0.25em;color:var(--ink-dim);
    text-transform:uppercase;
  }
  .hero-corner{
    position:absolute;color:#4a4a4a;font-size:16px;line-height:1;font-weight:300;z-index:4;
  }
  .hero-corner.tl{top:96px;left:60px;}
  .hero-corner.tr{top:96px;right:5%;}
  .hero-corner.bl{bottom:96px;left:34px;}
  .hero-corner.br{bottom:130px;right:36%;}
  .hero-crosshair{
    position:absolute;color:#4a4a4a;width:22px;height:22px;z-index:4;
  }
  .hero-crosshair.c1{top:160px;left:34px;}
  .hero-crosshair.c2{bottom:170px;right:30%;}
  .hero-crosshair.c3{top:420px;right:11%;}

  .hero-jp{
    font-size:13px;color:var(--accent);letter-spacing:0.12em;margin-bottom:16px;
  }
  .hero-stage h1{
    font-family:'Bebas Neue';
    font-size:clamp(52px,7.2vw,96px);
    line-height:0.92;letter-spacing:0.005em;color:var(--ink);
  }
  .hero-stage .eyebrow{
    display:inline-block;margin-top:20px;
    font-size:12px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--accent);font-weight:700;
  }
  .hero-stage p.tagline{
    margin-top:8px;color:var(--ink-dim);font-size:13px;
    letter-spacing:0.1em;text-transform:uppercase;
  }

  .hero-meta-tr{
    position:absolute;top:96px;right:5%;z-index:4;
    font-size:11px;letter-spacing:0.1em;line-height:1.7;color:var(--ink-dim);
    text-transform:uppercase;text-align:left;
  }
  .hero-meta-tr strong{color:var(--ink);display:block;}

  .hero-kanji-right{
    position:absolute;bottom:120px;right:5%;z-index:4;
    writing-mode:vertical-rl;color:var(--accent);font-size:14px;letter-spacing:0.25em;font-weight:600;
  }

  .hero-quote{
    position:absolute;bottom:54px;right:34%;z-index:4;
    font-size:11px;letter-spacing:0.08em;line-height:1.7;color:var(--ink-dim);
    text-transform:uppercase;text-align:left;max-width:170px;
  }

  .hero-bottom-bar{
    position:relative;z-index:3;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
    padding:18px 32px 22px 64px;
    border-top:1px solid #1c1c1c;
  }
  .hero-coords{
    font-size:12px;letter-spacing:0.05em;color:var(--ink-dim);line-height:1.5;
  }
  .hero-culture{
    display:flex;align-items:center;gap:14px;
    font-size:11px;letter-spacing:0.04em;color:var(--ink-dim);line-height:1.5;
    text-transform:uppercase;
  }
  .hero-culture svg{width:26px;height:26px;color:var(--ink-dim);flex-shrink:0;}
  .hero-culture-divider{width:1px;height:28px;background:var(--line);}
  .hero-worldwide-barcode{
    display:flex;flex-direction:column;align-items:flex-end;gap:4px;
  }
  .hero-worldwide-barcode svg{height:26px;}
  .hero-worldwide-barcode span{
    font-size:9px;letter-spacing:0.18em;color:var(--ink-dim);
  }

  @media (max-width:900px){
    .hero-meta-tr, .hero-quote, .hero-kanji-right, .hero-corner.br, .hero-crosshair.c2, .hero-crosshair.c3{display:none;}
  }
  @media (max-width:760px){
    .hero{min-height:0;}
    .hero-stage{padding:36px 24px 32px 52px;min-height:0;}
    .hero-vertical{font-size:9px;top:60px;bottom:60px;}
    .hero-corner.tl{top:64px;left:24px;}
    .hero-corner.bl{bottom:20px;left:24px;display:none;}
    .hero-crosshair.c1{top:120px;left:24px;}
    .hero-nav{padding:16px 20px 0;gap:20px;}
    .hero-bottom-bar{
      flex-direction:column;align-items:flex-start;
      padding:16px 20px;
    }
    .hero-worldwide-barcode{align-items:flex-start;}
  }

  /* ---------- Grid ---------- */
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px;}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:1px;
    background:var(--line);
    margin:48px 0;
    border:1px solid var(--line);
  }
  .card{
    background:var(--bg);
    position:relative;
    display:flex;flex-direction:column;
    transition:background .25s;
  }
  .card:hover{background:var(--bg-soft);}
  .card-img-wrap{
    position:relative;aspect-ratio:4/3;overflow:hidden;background:#fff;
  }
  .card-img-wrap img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .5s cubic-bezier(.2,.8,.2,1);
  }
  .card:hover .card-img-wrap img{transform:scale(1.04);}
  .card-tag{
    position:absolute;top:12px;left:12px;
    background:var(--accent);color:#fff;
    font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
    padding:4px 9px;border-radius:2px;font-weight:700;
  }
  .card-tag.out{background:#2a2a2a;color:var(--ink-dim);}
  .card-body{
    padding:18px 20px 20px;display:flex;flex-direction:column;gap:10px;flex:1;
  }
  .card-name{
    font-size:15px;font-weight:600;letter-spacing:0.01em;
  }
  .card-desc{
    font-size:12.5px;color:var(--ink-dim);line-height:1.5;
    flex:1;
  }
  .size-guide-link{
    align-self:flex-start;
    font-size:11px;letter-spacing:0.04em;text-transform:uppercase;font-weight:600;
    color:var(--accent);text-decoration:underline;text-underline-offset:3px;
    margin-top:-4px;
  }
  .size-guide-link:hover{color:#fff;}

  /* --- Precios oferta --- */
  .price-original{
    font-family:'Bebas Neue';font-size:16px;letter-spacing:0.02em;
    color:var(--ink-dim);text-decoration:line-through;opacity:0.7;
  }
  .price-sale{
    font-family:'Bebas Neue';font-size:22px;letter-spacing:0.02em;
    color:var(--accent);
  }
  .price-sale-badge{
    font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
    background:var(--accent);color:#fff;padding:2px 7px;border-radius:2px;
    align-self:center;
  }
  .price-block{display:flex;flex-direction:column;gap:1px;}

  /* --- Galería de imágenes --- */
  /* --- Slider de imágenes en tarjeta --- */
  .card-slider{position:relative;aspect-ratio:4/3;overflow:hidden;background:#fff;cursor:zoom-in;}
  .card-slider-track{
    display:flex;height:100%;
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    will-change:transform;
  }
  .card-slider-track img{
    min-width:100%;height:100%;object-fit:cover;flex-shrink:0;
    user-select:none;pointer-events:none;
  }
  .card-slider-dots{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    display:flex;gap:5px;z-index:2;
  }
  .card-slider-dot{
    width:6px;height:6px;border-radius:50%;
    background:rgba(255,255,255,0.5);transition:background .2s,transform .2s;
  }
  .card-slider-dot.active{background:#fff;transform:scale(1.2);}
  .slider-arrow{
    position:absolute;top:50%;transform:translateY(-50%);
    width:28px;height:28px;border-radius:50%;
    background:rgba(0,0,0,0.45);color:#fff;
    display:flex;align-items:center;justify-content:center;
    z-index:3;opacity:0;transition:opacity .15s;cursor:pointer;border:none;
  }
  .slider-arrow svg{width:14px;height:14px;}
  .slider-arrow.left{left:8px;}
  .slider-arrow.right{right:8px;}
  .card:hover .slider-arrow{opacity:1;}
  .card-tag-abs{position:absolute;top:12px;z-index:2;}
  .card-tag-abs.left{left:12px;}
  .card-tag-abs.right{right:12px;}

  /* --- Visor / Lightbox --- */
  .lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,0.95);
    z-index:400;display:none;align-items:center;justify-content:center;
    flex-direction:column;gap:16px;padding:20px;
  }
  .lightbox.show{display:flex;}
  .lightbox-img-wrap{
    position:relative;flex:1;display:flex;align-items:center;justify-content:center;
    overflow:hidden;width:100%;cursor:zoom-in;
  }
  .lightbox-img-wrap.zoomed{cursor:zoom-out;}
  .lightbox-img-wrap img{
    max-width:100%;max-height:70vh;object-fit:contain;
    transition:transform .3s ease;transform-origin:center center;
    user-select:none;
  }
  .lightbox-img-wrap.zoomed img{transform:scale(2.2);}
  .lightbox-nav{
    display:flex;gap:10px;
  }
  .lightbox-thumb{
    width:56px;height:56px;border-radius:2px;overflow:hidden;cursor:pointer;
    opacity:0.5;border:2px solid transparent;transition:all .15s;
  }
  .lightbox-thumb.active{opacity:1;border-color:var(--accent);}
  .lightbox-thumb img{width:100%;height:100%;object-fit:cover;}
  .lightbox-close{
    position:absolute;top:16px;right:16px;width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-dim);z-index:5;
  }
  .lightbox-close:hover{color:var(--ink);}
  .lightbox-arrow{
    position:absolute;top:50%;transform:translateY(-50%);
    width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    color:var(--ink-dim);z-index:5;
  }
  .lightbox-arrow:hover{color:var(--ink);}
  .lightbox-arrow.prev{left:10px;}
  .lightbox-arrow.next{right:10px;}
  .lightbox-arrow svg,.lightbox-close svg{width:22px;height:22px;}

  /* --- Secciones About y Terms --- */
  .info-sections{
    border-top:1px solid var(--line);
  }
  .info-section{
    border-bottom:1px solid var(--line);
  }
  .info-section-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 28px;cursor:pointer;
    transition:background .15s;
  }
  .info-section-header:hover{background:var(--bg-soft);}
  .info-section-header h3{
    font-family:'Bebas Neue';font-size:20px;letter-spacing:0.06em;
  }
  .info-section-header .chevron{
    width:18px;height:18px;color:var(--ink-dim);
    transition:transform .25s;flex-shrink:0;
  }
  .info-section-header.open .chevron{transform:rotate(180deg);}
  .info-section-body{
    display:none;padding:0 28px 24px;
    font-size:13.5px;color:var(--ink-dim);line-height:1.75;
    white-space:pre-line;
  }
  .info-section-body.open{display:block;}
  .size-table{
    width:100%;border-collapse:collapse;margin:6px 0 4px;font-size:13px;
  }
  .size-table th{
    text-align:left;color:var(--ink-dim);font-size:10px;letter-spacing:0.08em;
    text-transform:uppercase;padding:8px 6px;border-bottom:1px solid var(--card-border);
  }
  .size-table td{
    padding:10px 6px;border-bottom:1px solid var(--card-border);
    font-family:'Bebas Neue';letter-spacing:0.02em;font-size:15px;
  }
  .size-table tr:last-child td{border-bottom:none;}
  .card-foot{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:4px;
  }
  .card-price{
    font-family:'Bebas Neue';font-size:22px;letter-spacing:0.02em;
  }
  .btn-buy{
    display:flex;align-items:center;gap:7px;
    background:var(--ink);color:#0a0a0a;
    font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
    padding:10px 16px;border-radius:2px;
    transition:background .2s, transform .15s;
  }
  .btn-buy:hover{background:var(--accent);color:#fff;}
  .btn-buy:active{transform:scale(0.96);}
  .btn-buy svg{width:14px;height:14px;}
  .btn-buy.disabled{
    background:#1f1f1f;color:#555;pointer-events:none;
  }

  /* ---------- Owner controls on card ---------- */
  .owner-controls{
    display:flex;gap:8px;margin-top:6px;
  }
  .icon-btn{
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);border-radius:2px;color:var(--ink-dim);
    transition:all .15s;
  }
  .icon-btn:hover{border-color:var(--accent);color:var(--ink);}
  .icon-btn.danger:hover{border-color:#e8194f;color:#e8194f;}
  .icon-btn svg{width:15px;height:15px;}

  /* ---------- Empty state ---------- */
  .empty{
    text-align:center;padding:80px 20px;color:var(--ink-dim);
  }
  .empty .display{font-size:28px;color:var(--ink);margin-bottom:8px;}

  /* ---------- Footer ---------- */
  footer{
    border-top:1px solid var(--line);
    padding:40px 24px;text-align:center;color:var(--ink-dim);font-size:12px;
    letter-spacing:0.05em;
  }
  footer .display{font-size:18px;color:var(--ink);letter-spacing:0.1em;margin-bottom:6px;}
  .footer-socials{
    display:flex;align-items:center;justify-content:center;gap:24px;
    margin-top:20px;flex-wrap:wrap;
  }
  .social-link{
    display:flex;align-items:center;gap:8px;
    font-size:12px;letter-spacing:0.04em;color:var(--ink-dim);
    transition:color .2s;
  }
  .social-link:hover{color:var(--accent);}
  .social-link svg{width:18px;height:18px;flex-shrink:0;}
  .owner-access-dot{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;margin-top:18px;
    color:#3a3a3a;opacity:0.5;transition:all .2s;
  }
  .owner-access-dot:hover{color:var(--accent);opacity:1;}
  .owner-access-dot svg{width:14px;height:14px;}

  /* ---------- Modal base ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.7);
    backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;
    z-index:200;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--card);border:1px solid var(--card-border);
    width:100%;max-width:460px;max-height:90vh;overflow-y:auto;
    border-radius:4px;padding:28px;
    animation:pop .2s ease;
  }
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  .modal h2{font-family:'Bebas Neue';font-size:26px;letter-spacing:0.04em;margin-bottom:18px;}
  .field{margin-bottom:16px;}
  .field label{
    display:block;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:7px;
  }
  .field input, .field textarea, .field select{
    width:100%;padding:11px 13px;background:var(--bg-soft);
    border:1px solid var(--card-border);border-radius:2px;font-size:14px;
    transition:border-color .15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none;border-color:var(--accent);
  }
  .field textarea{resize:vertical;min-height:70px;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .btn-primary, .btn-secondary{
    flex:1;padding:12px 16px;border-radius:2px;
    font-size:13px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
    transition:all .15s;text-align:center;
  }
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#c91470;}
  .btn-secondary{background:transparent;border:1px solid var(--card-border);color:var(--ink-dim);}
  .btn-secondary:hover{border-color:var(--ink-dim);color:var(--ink);}
  .modal-close{
    position:absolute;top:18px;right:18px;color:var(--ink-dim);
    width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  }
  .modal-close:hover{color:var(--ink);}
  .modal-sub{font-size:12px;color:var(--ink-dim);margin-bottom:18px;line-height:1.5;}
  .img-preview-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .img-preview-row img{
    width:64px;height:64px;object-fit:cover;border-radius:2px;
    border:2px solid transparent;cursor:pointer;
  }
  .img-preview-row img.selected{border-color:var(--accent);}
  .upload-zone{
    border:1px dashed var(--card-border);border-radius:2px;
    padding:18px;text-align:center;font-size:12px;color:var(--ink-dim);
    cursor:pointer;transition:border-color .15s;
    display:flex;flex-direction:column;align-items:center;
  }
  .upload-zone svg{width:18px;height:18px;margin-bottom:2px;}
  .upload-zone:hover{border-color:var(--accent);color:var(--ink);}
  .upload-progress{font-size:11px;color:var(--accent);margin-top:6px;display:none;}

  /* ---------- WhatsApp message preview ---------- */
  .wa-preview{
    background:var(--bg-soft);border:1px solid var(--card-border);
    border-radius:4px;padding:14px;font-size:13px;line-height:1.6;
    color:var(--ink-dim);white-space:pre-wrap;margin-bottom:4px;
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#0a0a0a;padding:13px 22px;border-radius:30px;
    font-size:13px;font-weight:600;z-index:300;opacity:0;pointer-events:none;
    transition:all .25s;letter-spacing:0.02em;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- Owner login ---------- */
  .login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .login-box{
    width:100%;max-width:380px;text-align:center;
  }
  .login-box img{height:50px;margin-bottom:24px;}
  .login-box h2{font-family:'Bebas Neue';font-size:28px;margin-bottom:6px;letter-spacing:0.05em;}
  .login-box p{color:var(--ink-dim);font-size:13px;margin-bottom:26px;}

  /* ---------- Loading ---------- */
  .loading-screen{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  }
  .spinner{
    width:28px;height:28px;border:2px solid var(--card-border);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen p{color:var(--ink-dim);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;}

  /* ---------- Stock badge in owner form ---------- */
  .toggle-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:11px 13px;background:var(--bg-soft);border:1px solid var(--card-border);
    border-radius:2px;margin-bottom:16px;
  }
  .toggle-row span{font-size:13px;}
  .switch{
    width:42px;height:24px;border-radius:14px;background:#333;position:relative;
    transition:background .2s;flex-shrink:0;
  }
  .switch.on{background:var(--accent);}
  .switch::after{
    content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;
    border-radius:50%;background:#fff;transition:left .2s;
  }
  .switch.on::after{left:21px;}

  @media (max-width:560px){
    .hero h1{font-size:clamp(36px,12vw,56px);}
    .topbar{padding:12px 16px;}
    .field-row{flex-direction:column;gap:16px;}
    .modal{padding:22px;}
  }
</style>
</head>

function formatPrice(price){
  const num = Number(price) || 0;
  // Muestra decimales solo si no son ",00" (ej: 89 -> "89", 89.9 -> "89.90")
  return num % 1 === 0 ? num.toFixed(0) : num.toFixed(2);
}

function renderBarcodeSvg(){
  // Código de barras puramente decorativo (no codifica datos reales)
  const widths = [2,1,3,1,1,2,3,1,2,1,1,3,2,1,1,2,3,1,2,2,1,3,1,2];
  let x = 0;
  const bars = widths.map((w, i) => {
    const bar = i % 2 === 0
      ? `<rect x="${x}" y="0" width="${w}" height="32" fill="currentColor"/>`
      : "";
    x += w + 1;
    return bar;
  }).join("");
  return `<svg viewBox="0 0 ${x} 32" style="color:var(--ink-dim);height:28px;width:auto;">${bars}</svg>`;
}

function resolveImage(imageValue){
  if(!imageValue) return "";
  if(imageValue.startsWith("data:")) return imageValue; // foto subida por el dueño
  return IMAGES[imageValue] || "";
}

function getProductImages(p){
  if(p.images && p.images.length > 0) return p.images.map(resolveImage).filter(Boolean);
  if(p.image) return [resolveImage(p.image)];
  return [];
}

function renderPriceBlock(p){
  if(p.salePrice && Number(p.salePrice) > 0){
    const pct = Math.round((1 - Number(p.salePrice)/Number(p.price))*100);
    return `
      <div class="price-block">
        <span class="price-original">S/ ${formatPrice(p.price)}</span>
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span class="price-sale">S/ ${formatPrice(p.salePrice)}</span>
          ${pct>0?`<span class="price-sale-badge">-${pct}%</span>`:''}
        </div>
      </div>`;
  }
  return `<span class="card-price">S/ ${formatPrice(p.price)}</span>`;
}

function readFileAsCompressedDataUrl(file, maxSize = 1200, quality = 0.82){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=> reject(new Error("No se pudo leer el archivo"));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=> reject(new Error("No se pudo procesar la imagen"));
      img.onload = ()=>{
        let { width, height } = img;
        if(width > maxSize || height > maxSize){
          if(width > height){
            height = Math.round(height * (maxSize / width));
            width = maxSize;
          }else{
            width = Math.round(width * (maxSize / height));
            height = maxSize;
          }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function loadState(){
  if(firebaseReady){
    try{
      const snap = await db.ref(STORAGE_KEY).once("value");
      const val = snap.val();
      state.products = val ? val : DEFAULT_PRODUCTS;
      if(!val){
        await db.ref(STORAGE_KEY).set(DEFAULT_PRODUCTS);
      }
    }catch(e){
      console.error("Error cargando productos de Firebase:", e);
      state.products = DEFAULT_PRODUCTS;
    }
    try{
      const catSnap = await db.ref(CATEGORIES_KEY).once("value");
      const catVal = catSnap.val();
      state.categories = catVal ? catVal : DEFAULT_CATEGORIES;
      if(!catVal){
        await db.ref(CATEGORIES_KEY).set(DEFAULT_CATEGORIES);
      }
    }catch(e){
      state.categories = DEFAULT_CATEGORIES;
    }
    try{
      const waSnap = await db.ref(WHATSAPP_NUMBER_KEY).once("value");
      const waVal = waSnap.val();
      if(waVal) state.whatsapp = waVal;
    }catch(e){ /* keep default */ }
    try{
      const bgSnap = await db.ref(HERO_BG_KEY).once("value");
      const bgVal = bgSnap.val();
      if(bgVal) state.heroBgImage = bgVal;
    }catch(e){ /* keep default */ }
    try{
      const annSnap = await db.ref(ANNOUNCEMENT_KEY).once("value");
      const annVal = annSnap.val();
      if(annVal !== null && annVal !== undefined) state.announcement = annVal;
    }catch(e){ /* keep default */ }
    try{
      const termsSnap = await db.ref(TERMS_KEY).once("value");
      const termsVal = termsSnap.val();
      if(termsVal) state.terms = termsVal;
    }catch(e){ /* keep default */ }
    try{
      const aboutSnap = await db.ref(ABOUT_KEY).once("value");
      const aboutVal = aboutSnap.val();
      if(aboutVal) state.about = aboutVal;
    }catch(e){ /* keep default */ }
  }else{
    // Fallback local
    try{
      const local = localStorage.getItem(STORAGE_KEY);
      state.products = local ? JSON.parse(local) : DEFAULT_PRODUCTS;
    }catch(e){ state.products = DEFAULT_PRODUCTS; }
    try{
      const localCat = localStorage.getItem(CATEGORIES_KEY);
      state.categories = localCat ? JSON.parse(localCat) : DEFAULT_CATEGORIES;
    }catch(e){ state.categories = DEFAULT_CATEGORIES; }
    try{
      const localWa = localStorage.getItem(WHATSAPP_NUMBER_KEY);
      if(localWa) state.whatsapp = JSON.parse(localWa);
    }catch(e){ /* keep default */ }
    try{
      const localBg = localStorage.getItem(HERO_BG_KEY);
      if(localBg) state.heroBgImage = JSON.parse(localBg);
    }catch(e){ /* keep default */ }
    try{
      const localAnn = localStorage.getItem(ANNOUNCEMENT_KEY);
      if(localAnn !== null) state.announcement = JSON.parse(localAnn);
    }catch(e){ /* keep default */ }
    try{
      const localTerms = localStorage.getItem(TERMS_KEY);
      if(localTerms) state.terms = JSON.parse(localTerms);
    }catch(e){ /* keep default */ }
    try{
      const localAbout = localStorage.getItem(ABOUT_KEY);
      if(localAbout) state.about = JSON.parse(localAbout);
    }catch(e){ /* keep default */ }
  }
  state.loading = false;
}

function buildWhatsappLink(product, customMsg){
  const base = customMsg && customMsg.trim().length
    ? customMsg
    : `Hola! Me interesa el producto "${product.name}" (S/ ${formatPrice(product.price)}). ¿Está disponible?`;
  const clean = (state.whatsapp || "").replace(/[^0-9]/g,"");
  return `https://wa.me/${clean}?text=${encodeURIComponent(base)}`;
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}

let currentInterestProduct = null;

function bindClientEvents(){
  document.querySelectorAll('[data-action="filter"]').forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.activeCategory = btn.getAttribute("data-cat");
      render();
    });
  });

  // Slider: estado por producto
  const sliderState = {}; // pid -> { idx, total }

  function goToSlide(pid, newIdx){
    const p = state.products.find(x=>x.id===pid);
    if(!p) return;
    const imgs = getProductImages(p);
    const total = imgs.length;
    if(total < 2) return;
    newIdx = ((newIdx % total) + total) % total;
    sliderState[pid] = { idx: newIdx, total };
    const track = document.getElementById(`track-${pid}`);
    if(track) track.style.transform = `translateX(-${newIdx * 100}%)`;
    const dotsEl = document.getElementById(`dots-${pid}`);
    if(dotsEl){
      dotsEl.querySelectorAll('.card-slider-dot').forEach((d,i)=> d.classList.toggle('active', i===newIdx));
    }
  }

  // Flechas de slider
  document.querySelectorAll('[data-action="slide-prev"]').forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      const pid = btn.getAttribute("data-pid");
      const cur = sliderState[pid]?.idx || 0;
      goToSlide(pid, cur - 1);
    });
  });
  document.querySelectorAll('[data-action="slide-next"]').forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      const pid = btn.getAttribute("data-pid");
      const cur = sliderState[pid]?.idx || 0;
      goToSlide(pid, cur + 1);
    });
  });

  // Swipe táctil en cada slider
  document.querySelectorAll('.card-slider').forEach(sliderEl=>{
    const pid = sliderEl.getAttribute("data-pid");
    let touchStartX = 0;
    sliderEl.addEventListener("touchstart", (e)=>{ touchStartX = e.touches[0].clientX; }, { passive:true });
    sliderEl.addEventListener("touchend", (e)=>{
      const diff = touchStartX - e.changedTouches[0].clientX;
      if(Math.abs(diff) > 40){
        const cur = sliderState[pid]?.idx || 0;
        goToSlide(pid, diff > 0 ? cur + 1 : cur - 1);
      }
    });
  });

  // Lightbox: zoom al hacer click en la imagen principal
  let lightboxImages = [];
  let lightboxIndex = 0;
  let lightboxZoomed = false;

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxNav = document.getElementById("lightboxNav");
  const lightboxImgWrap = document.getElementById("lightboxImgWrap");

  function openLightbox(imgs, startIdx){
    lightboxImages = imgs;
    lightboxIndex = startIdx;
    lightboxZoomed = false;
    lightboxImgWrap.classList.remove("zoomed");
    lightboxImg.src = imgs[lightboxIndex];
    lightboxNav.innerHTML = imgs.map((img, i)=>`
      <div class="lightbox-thumb ${i===lightboxIndex?'active':''}" data-idx="${i}">
        <img src="${img}" alt="">
      </div>`).join("");
    lightboxNav.querySelectorAll('.lightbox-thumb').forEach(t=>{
      t.addEventListener("click", ()=>{
        lightboxIndex = parseInt(t.getAttribute("data-idx"));
        updateLightbox();
      });
    });
    lightbox.classList.add("show");
    document.body.style.overflow = "hidden";
  }

  function updateLightbox(){
    lightboxZoomed = false;
    lightboxImgWrap.classList.remove("zoomed");
    lightboxImg.src = lightboxImages[lightboxIndex];
    lightboxNav.querySelectorAll('.lightbox-thumb').forEach((t,i)=> t.classList.toggle('active', i===lightboxIndex));
  }

  function closeLightbox(){
    lightbox.classList.remove("show");
    document.body.style.overflow = "";
  }

  document.querySelectorAll('[data-action="zoom"]').forEach(el=>{
    el.addEventListener("click", (e)=>{
      // No abrir lightbox si se hizo click en flecha
      if(e.target.closest('.slider-arrow')) return;
      const pid = el.getAttribute("data-pid");
      const p = state.products.find(x=>x.id===pid);
      if(!p) return;
      const imgs = getProductImages(p);
      if(!imgs.length) return;
      const startIdx = sliderState[pid]?.idx || 0;
      openLightbox(imgs, startIdx);
    });
  });

  lightboxImgWrap.addEventListener("click", ()=>{
    lightboxZoomed = !lightboxZoomed;
    lightboxImgWrap.classList.toggle("zoomed", lightboxZoomed);
  });

  document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", (e)=>{ if(e.target===lightbox) closeLightbox(); });

  document.getElementById("lightboxPrev").addEventListener("click", (e)=>{
    e.stopPropagation();
    if(lightboxImages.length < 2) return;
    lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
    updateLightbox();
  });

  document.getElementById("lightboxNext").addEventListener("click", (e)=>{
    e.stopPropagation();
    if(lightboxImages.length < 2) return;
    lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
    updateLightbox();
  });

  document.addEventListener("keydown", function lbKeys(e){
    if(!lightbox.classList.contains("show")) return;
    if(e.key==="Escape") closeLightbox();
    if(e.key==="ArrowLeft"){ lightboxIndex=(lightboxIndex-1+lightboxImages.length)%lightboxImages.length; updateLightbox(); }
    if(e.key==="ArrowRight"){ lightboxIndex=(lightboxIndex+1)%lightboxImages.length; updateLightbox(); }
  });

  // Secciones desplegables About / Terms
  document.querySelectorAll('[data-action="toggle-section"]').forEach(header=>{
    header.addEventListener("click", ()=>{
      const section = header.getAttribute("data-section");
      const body = document.getElementById(`section-${section}`);
      const isOpen = body.classList.contains("open");
      body.classList.toggle("open", !isOpen);
      header.classList.toggle("open", !isOpen);
    });
  });

  document.querySelectorAll('[data-action="interest"]').forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.getAttribute("data-id");
      currentInterestProduct = state.products.find(p=>p.id===id);
      if(!currentInterestProduct) return;
      const defaultMsg = `Hola! Me interesa el producto "${currentInterestProduct.name}" (S/ ${formatPrice(currentInterestProduct.price)}). ¿Está disponible?`;
      document.getElementById("interestMsg").value = defaultMsg;
      document.getElementById("sendInterest").href = buildWhatsappLink(currentInterestProduct, defaultMsg);
      document.getElementById("interestOverlay").classList.add("show");
    });
  });

  const msgArea = document.getElementById("interestMsg");
  if(msgArea){
    msgArea.addEventListener("input", ()=>{
      if(currentInterestProduct){
        document.getElementById("sendInterest").href = buildWhatsappLink(currentInterestProduct, msgArea.value);
      }
    });
  }

  const closeBtn = document.getElementById("closeInterest");
  const cancelBtn = document.getElementById("cancelInterest");
  const overlay = document.getElementById("interestOverlay");
  [closeBtn, cancelBtn].forEach(b=> b && b.addEventListener("click", ()=> overlay.classList.remove("show")));
  overlay && overlay.addEventListener("click", (e)=>{ if(e.target === overlay) overlay.classList.remove("show"); });

  const sendBtn = document.getElementById("sendInterest");
  if(sendBtn){
    sendBtn.addEventListener("click", ()=>{
      setTimeout(()=> overlay.classList.remove("show"), 300);
    });
  }

  // Size guide modal
  const sizeGuideOverlay = document.getElementById("sizeGuideOverlay");
  document.querySelectorAll('[data-action="size-guide"]').forEach(btn=>{
    btn.addEventListener("click", ()=> sizeGuideOverlay.classList.add("show"));
  });
  const closeSizeGuide = ()=> sizeGuideOverlay.classList.remove("show");
  const closeSizeGuideBtn = document.getElementById("closeSizeGuide");
  const closeSizeGuideBtn2 = document.getElementById("closeSizeGuide2");
  [closeSizeGuideBtn, closeSizeGuideBtn2].forEach(b=> b && b.addEventListener("click", closeSizeGuide));
  sizeGuideOverlay && sizeGuideOverlay.addEventListener("click", (e)=>{ if(e.target === sizeGuideOverlay) closeSizeGuide(); });
}

let stockToggleState = true;

function bindOwnerDashboardEvents(){
  // Menú desplegable de configuración
  const configToggle = document.getElementById("ownerConfigToggle");
  const configMenu = document.getElementById("ownerConfigMenu");
  configToggle.addEventListener("click", (e)=>{
    e.stopPropagation();
    configMenu.classList.toggle("open");
  });
  document.addEventListener("click", ()=> configMenu.classList.remove("open"), { once: false });
  configMenu.addEventListener("click", (e)=> e.stopPropagation());

  document.querySelectorAll('[data-action="filter"]').forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.activeCategory = btn.getAttribute("data-cat");
      render();
    });
  });

  document.getElementById("logoutBtn").addEventListener("click", ()=>{
    state.authed = false;
    window.location.hash = "";
  });

  document.getElementById("addProductBtn").addEventListener("click", ()=> openProductModal(null));

  document.querySelectorAll('[data-action="edit"]').forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.getAttribute("data-id");
      const product = state.products.find(p=>p.id===id);
      openProductModal(product);
    });
  });

  document.querySelectorAll('[data-action="delete"]').forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-id");
      const product = state.products.find(p=>p.id===id);
      if(!product) return;
      if(confirm(`¿Eliminar "${product.name}" del catálogo?`)){
        state.products = state.products.filter(p=>p.id!==id);
        await saveProducts();
        render();
        showToast("Prenda eliminada");
      }
    });
  });

  // Product modal
  const productOverlay = document.getElementById("productOverlay");
  document.getElementById("closeProductModal").addEventListener("click", ()=> productOverlay.classList.remove("show"));
  document.getElementById("cancelProductModal").addEventListener("click", ()=> productOverlay.classList.remove("show"));
  productOverlay.addEventListener("click", (e)=>{ if(e.target===productOverlay) productOverlay.classList.remove("show"); });

  // El fileInput es reutilizado tanto por uploadZone como por triggerPickImg dentro de renderImageGrid
  const fileInput = document.getElementById("fileInput");
  const uploadZone = document.getElementById("uploadZone");
  if(uploadZone) uploadZone.addEventListener("click", ()=> fileInput.click());

  fileInput.addEventListener("change", async ()=>{
    const file = fileInput.files[0];
    if(!file) return;
    if(!file.type.startsWith("image/")){
      showToast("Elige un archivo de imagen válido");
      fileInput.value = "";
      return;
    }
    if(uploadedImages.length >= 4){
      showToast("Máximo 4 fotos por prenda");
      fileInput.value = "";
      return;
    }
    showToast("Procesando imagen…");
    try{
      const dataUrl = await readFileAsCompressedDataUrl(file);
      uploadedImages.push(dataUrl);
      renderImageGrid();
      showToast("Foto añadida");
    }catch(err){
      showToast("No se pudo cargar la foto");
    }finally{
      fileInput.value = "";
    }
  });

  document.getElementById("stockToggle").addEventListener("click", ()=>{
    stockToggleState = !stockToggleState;
    document.getElementById("stockToggle").classList.toggle("on", stockToggleState);
  });

  document.getElementById("saveProductBtn").addEventListener("click", async ()=>{
    const id = document.getElementById("productId").value;
    const name = document.getElementById("fieldName").value.trim();
    const desc = document.getElementById("fieldDesc").value.trim();
    const price = parseFloat(document.getElementById("fieldPrice").value) || 0;
    const salePrice = parseFloat(document.getElementById("fieldSalePrice").value) || 0;
    const category = document.getElementById("fieldCategory").value || (state.categories[0] || "Polos");

    if(!name){
      showToast("Ponle un nombre a la prenda");
      return;
    }
    if(uploadedImages.length === 0){
      showToast("Elige al menos una foto");
      return;
    }

    const productData = {
      name, desc, price,
      salePrice: salePrice > 0 ? salePrice : null,
      category,
      images: [...uploadedImages],
      image: uploadedImages[0], // compatibilidad legacy
      stock: stockToggleState
    };

    if(id){
      const idx = state.products.findIndex(p=>p.id===id);
      if(idx > -1) state.products[idx] = { ...state.products[idx], ...productData };
    }else{
      state.products.push({ id: uid(), ...productData });
    }
    await saveProducts();
    productOverlay.classList.remove("show");
    render();
    showToast(id ? "Prenda actualizada" : "Prenda añadida");
  });

  // Settings modal
  const settingsOverlay = document.getElementById("settingsOverlay");
  document.getElementById("openSettings").addEventListener("click", ()=>{
    document.getElementById("fieldWhatsapp").value = state.whatsapp;
    settingsOverlay.classList.add("show");
  });
  document.getElementById("closeSettingsModal").addEventListener("click", ()=> settingsOverlay.classList.remove("show"));
  document.getElementById("cancelSettingsModal").addEventListener("click", ()=> settingsOverlay.classList.remove("show"));
  settingsOverlay.addEventListener("click", (e)=>{ if(e.target===settingsOverlay) settingsOverlay.classList.remove("show"); });

  document.getElementById("saveSettingsBtn").addEventListener("click", async ()=>{
    const num = document.getElementById("fieldWhatsapp").value.replace(/[^0-9]/g,"");
    if(!num){
      showToast("Ingresa un número válido");
      return;
    }
    await saveWhatsapp(num);
    settingsOverlay.classList.remove("show");
    showToast("WhatsApp actualizado");
  });

  // Categories modal
  const categoriesOverlay = document.getElementById("categoriesOverlay");
  document.getElementById("manageCategoriesBtn").addEventListener("click", ()=>{
    categoriesOverlay.classList.add("show");
  });
  const closeCategories = ()=> categoriesOverlay.classList.remove("show");
  document.getElementById("closeCategoriesModal").addEventListener("click", closeCategories);
  document.getElementById("closeCategoriesModal2").addEventListener("click", closeCategories);
  categoriesOverlay.addEventListener("click", (e)=>{ if(e.target===categoriesOverlay) closeCategories(); });

  const addCategory = async ()=>{
    const input = document.getElementById("newCategoryInput");
    const value = input.value.trim();
    if(!value){
      showToast("Escribe un nombre para la categoría");
      return;
    }
    if(state.categories.some(c => c.toLowerCase() === value.toLowerCase())){
      showToast("Esa categoría ya existe");
      return;
    }
    state.categories.push(value);
    await saveCategories();
    input.value = "";
    document.getElementById("categoriesOverlay").classList.add("show");
    render();
    document.getElementById("categoriesOverlay").classList.add("show");
    showToast("Categoría añadida");
  };
  document.getElementById("addCategoryBtn").addEventListener("click", addCategory);
  document.getElementById("newCategoryInput").addEventListener("keydown", (e)=>{
    if(e.key === "Enter") addCategory();
  });

  document.querySelectorAll('[data-action="delete-cat"]').forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const cat = btn.getAttribute("data-cat");
      const inUse = state.products.some(p => (p.category || "Polos") === cat);
      const confirmMsg = inUse
        ? `Hay prendas usando "${cat}". Si la eliminas, esas prendas quedarán sin categoría asignada visible. ¿Eliminar igual?`
        : `¿Eliminar la categoría "${cat}"?`;
      if(confirm(confirmMsg)){
        state.categories = state.categories.filter(c => c !== cat);
        if(state.activeCategory === cat) state.activeCategory = "Todos";
        await saveCategories();
        render();
        document.getElementById("categoriesOverlay").classList.add("show");
        showToast("Categoría eliminada");
      }
    });
  });

  // Hero background image modal
  const heroBgOverlay = document.getElementById("heroBgOverlay");
  document.getElementById("manageHeroBgBtn").addEventListener("click", ()=>{
    heroBgOverlay.classList.add("show");
  });
  const closeHeroBg = ()=> heroBgOverlay.classList.remove("show");
  const closeHeroBgBtn = document.getElementById("closeHeroBgModal");
  const closeHeroBgBtn2 = document.getElementById("closeHeroBgModal2");
  [closeHeroBgBtn, closeHeroBgBtn2].forEach(b=> b && b.addEventListener("click", closeHeroBg));
  heroBgOverlay.addEventListener("click", (e)=>{ if(e.target===heroBgOverlay) closeHeroBg(); });

  const heroBgUploadZone = document.getElementById("heroBgUploadZone");
  const heroBgFileInput = document.getElementById("heroBgFileInput");
  heroBgUploadZone.addEventListener("click", ()=> heroBgFileInput.click());
  heroBgFileInput.addEventListener("change", async ()=>{
    const file = heroBgFileInput.files[0];
    if(!file) return;
    if(!file.type.startsWith("image/")){
      showToast("Elige un archivo de imagen válido");
      return;
    }
    const originalLabel = heroBgUploadZone.innerHTML;
    heroBgUploadZone.innerHTML = `<div style="font-size:12px;">Procesando imagen…</div>`;
    try{
      const dataUrl = await readFileAsCompressedDataUrl(file, 1920, 0.8);
      await saveHeroBg(dataUrl);
      render();
      document.getElementById("heroBgOverlay").classList.add("show");
      showToast("Imagen de encabezado actualizada");
    }catch(err){
      showToast("No se pudo cargar la imagen");
    }finally{
      heroBgFileInput.value = "";
    }
  });

  const removeHeroBgBtn = document.getElementById("removeHeroBgBtn");
  if(removeHeroBgBtn){
    removeHeroBgBtn.addEventListener("click", async ()=>{
      if(confirm("¿Quitar la imagen de fondo del encabezado? Se mostrará el diseño por defecto.")){
        await removeHeroBg();
        render();
        document.getElementById("heroBgOverlay").classList.add("show");
        showToast("Imagen quitada");
      }
    });
  }

  // Announcement modal
  const announcementOverlay = document.getElementById("announcementOverlay");
  document.getElementById("manageAnnouncementBtn").addEventListener("click", ()=>{
    announcementOverlay.classList.add("show");
  });
  const closeAnnouncement = ()=> announcementOverlay.classList.remove("show");
  document.getElementById("closeAnnouncementModal").addEventListener("click", closeAnnouncement);
  document.getElementById("cancelAnnouncementModal").addEventListener("click", closeAnnouncement);
  announcementOverlay.addEventListener("click", (e)=>{ if(e.target===announcementOverlay) closeAnnouncement(); });

  document.getElementById("saveAnnouncementBtn").addEventListener("click", async ()=>{
    const text = document.getElementById("fieldAnnouncement").value.trim();
    await saveAnnouncement(text);
    closeAnnouncement();
    showToast(text ? "Anuncio actualizado" : "Anuncio ocultado");
  });

  // About modal
  const aboutOverlay = document.getElementById("aboutOverlay");
  const closeAbout = ()=> aboutOverlay.classList.remove("show");
  document.getElementById("manageAboutBtn").addEventListener("click", ()=> aboutOverlay.classList.add("show"));
  document.getElementById("closeAboutModal").addEventListener("click", closeAbout);
  document.getElementById("cancelAboutModal").addEventListener("click", closeAbout);
  aboutOverlay.addEventListener("click", (e)=>{ if(e.target===aboutOverlay) closeAbout(); });
  document.getElementById("saveAboutBtn").addEventListener("click", async ()=>{
    const text = document.getElementById("fieldAbout").value.trim();
    await saveAbout(text);
    closeAbout();
    showToast("Historia de MOOD guardada");
  });

  // Terms modal
  const termsOverlay = document.getElementById("termsOverlay");
  const closeTerms = ()=> termsOverlay.classList.remove("show");
  document.getElementById("manageTermsBtn").addEventListener("click", ()=> termsOverlay.classList.add("show"));
  document.getElementById("closeTermsModal").addEventListener("click", closeTerms);
  document.getElementById("cancelTermsModal").addEventListener("click", closeTerms);
  termsOverlay.addEventListener("click", (e)=>{ if(e.target===termsOverlay) closeTerms(); });
  document.getElementById("saveTermsBtn").addEventListener("click", async ()=>{
    const text = document.getElementById("fieldTerms").value.trim();
    await saveTerms(text);
    closeTerms();
    showToast("Términos y condiciones guardados");
  });
}

let uploadedImages = []; // array de data-urls o keys de imágenes predefinidas

function openProductModal(product){
  stockToggleState = product ? !!product.stock : true;
  uploadedImages = [];

  document.getElementById("productModalTitle").textContent = product ? "Editar prenda" : "Añadir prenda";
  document.getElementById("productId").value = product ? product.id : "";
  document.getElementById("fieldName").value = product ? product.name : "";
  document.getElementById("fieldDesc").value = product ? product.desc : "";
  document.getElementById("fieldPrice").value = product ? product.price : "";
  document.getElementById("fieldSalePrice").value = product ? (product.salePrice || "") : "";
  document.getElementById("stockToggle").classList.toggle("on", stockToggleState);

  const categories = state.categories && state.categories.length ? state.categories : DEFAULT_CATEGORIES;
  const currentCat = product ? (product.category || categories[0]) : categories[0];
  document.getElementById("fieldCategory").innerHTML = categories.map(c =>
    `<option value="${escapeHtml(c)}" ${c === currentCat ? 'selected' : ''}>${escapeHtml(c)}</option>`
  ).join("");

  // Cargar imágenes existentes del producto
  if(product){
    uploadedImages = product.images
      ? [...product.images]
      : (product.image ? [product.image] : []);
  }

  // Si no tiene imágenes guardadas, pre-seleccionar la primera predefinida
  if(uploadedImages.length === 0){
    const firstKey = Object.keys(IMAGES).find(k => k !== "logo");
    if(firstKey) uploadedImages = [firstKey];
  }

  renderImageGrid();
  document.getElementById("productOverlay").classList.add("show");
}

function renderImageGrid(){
  const imgKeys = Object.keys(IMAGES).filter(k => k !== "logo");
  const MAX = 4;

  // Sección de imágenes actuales del producto (array uploadedImages)
  let currentHtml = uploadedImages.map((key, i) => {
    const src = resolveImage(key);
    return `
      <div class="multi-img-item" data-idx="${i}">
        <img src="${src}" alt="">
        ${i===0 ? '<span class="multi-img-badge">Principal</span>' : ''}
        <button class="multi-img-remove" data-idx="${i}" title="Quitar">${ICONS.close}</button>
      </div>`;
  }).join("");

  if(uploadedImages.length < MAX){
    currentHtml += `
      <div class="multi-img-add" id="triggerPickImg" title="Añadir foto">
        ${ICONS.plus}
      </div>`;
  }

  // Sección de fotos predefinidas para elegir
  const presetHtml = imgKeys.map(k => `
    <img src="${IMAGES[k]}" data-key="${k}" class="preset-thumb ${uploadedImages.includes(k)?'used':''}" title="${k}">
  `).join("");

  document.getElementById("imageOptions").innerHTML = `
    <div class="multi-img-grid" id="multiImgGrid">${currentHtml}</div>
    <p style="font-size:11px;color:var(--ink-dim);margin:8px 0 6px;">
      ${uploadedImages.length < MAX ? `Puedes añadir hasta ${MAX} fotos. ` : 'Máximo de fotos alcanzado. '}
      Haz click en las fotos de abajo para agregarlas, o sube una nueva.
    </p>
    <div class="preset-thumbs-row" id="presetThumbsRow">${presetHtml}</div>
  `;

  // Bindings de la cuadrícula actual
  document.querySelectorAll('.multi-img-remove').forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      const idx = parseInt(btn.getAttribute("data-idx"));
      uploadedImages.splice(idx, 1);
      renderImageGrid();
    });
  });

  const addBtn = document.getElementById("triggerPickImg");
  if(addBtn) addBtn.addEventListener("click", ()=> document.getElementById("fileInput").click());

  // Click en fotos predefinidas
  document.querySelectorAll('.preset-thumb').forEach(img=>{
    img.addEventListener("click", ()=>{
      const key = img.getAttribute("data-key");
      if(uploadedImages.includes(key)){
        uploadedImages = uploadedImages.filter(k=>k!==key);
      }else if(uploadedImages.length < MAX){
        uploadedImages.push(key);
      }else{
        showToast(`Máximo ${MAX} fotos por prenda`);
        return;
      }
      renderImageGrid();
    });
  });
}

function renderImageOptions(imgKeys, selectedKey, customDataUrl){
  // Fallback legacy — ya no se usa directamente pero lo mantengo por compatibilidad
  renderImageGrid();
}

/* ============================================================
   MAIN RENDER
============================================================ */
function renderLoading(){
  return `
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Cargando catálogo MOOD…</p>
    </div>
  `;
}

function render(){
  if(state.loading){
    root.innerHTML = renderLoading();
    return;
  }

  const route = getRouteFromHash();

  if(route === "owner"){
    if(!state.authed){
      root.innerHTML = renderOwnerLogin();
      bindOwnerLoginEvents();
    }else{
      root.innerHTML = renderOwnerDashboard();
      bindOwnerDashboardEvents();
    }
  }else{
    root.innerHTML = renderClientView();
    bindClientEvents();
  }

  // Convierte emojis de texto a imágenes Twemoji para que se vean igual en todos los dispositivos
  if(window.twemoji){
    try{
      window.twemoji.parse(root, { folder: "svg", ext: ".svg" });
    }catch(e){ /* si falla, los emojis quedan como texto del sistema */ }
  }
}

/* ---------------- Init ---------------- */
(async function init(){
  render();
  await loadState();
  render();

  if(firebaseReady){
    // Tiempo real: cualquier cambio en la base de datos se refleja al instante
    db.ref(STORAGE_KEY).on("value", (snap)=>{
      const fresh = snap.val();
      if(!fresh) return;
      if(getRouteFromHash() === "owner" && state.authed) return; // no interrumpir edición activa
      if(JSON.stringify(fresh) !== JSON.stringify(state.products)){
        state.products = fresh;
        render();
      }
    });
    db.ref(WHATSAPP_NUMBER_KEY).on("value", (snap)=>{
      const fresh = snap.val();
      if(fresh && fresh !== state.whatsapp){
        state.whatsapp = fresh;
      }
    });
    db.ref(CATEGORIES_KEY).on("value", (snap)=>{
      const fresh = snap.val();
      if(!fresh) return;
      if(getRouteFromHash() === "owner" && state.authed) return;
      if(JSON.stringify(fresh) !== JSON.stringify(state.categories)){
        state.categories = fresh;
        render();
      }
    });
    db.ref(HERO_BG_KEY).on("value", (snap)=>{
      const fresh = snap.val();
      if(getRouteFromHash() === "owner" && state.authed) return;
      if(fresh !== state.heroBgImage){
        state.heroBgImage = fresh || null;
        render();
      }
    });
    db.ref(ANNOUNCEMENT_KEY).on("value", (snap)=>{
      const fresh = snap.val();
      if(getRouteFromHash() === "owner" && state.authed) return;
      if(fresh !== null && fresh !== undefined && fresh !== state.announcement){
        state.announcement = fresh; render();
      }
    });
    db.ref(TERMS_KEY).on("value", (snap)=>{
      const fresh = snap.val();
      if(getRouteFromHash() === "owner" && state.authed) return;
      if(fresh && fresh !== state.terms){ state.terms = fresh; render(); }
    });
    db.ref(ABOUT_KEY).on("value", (snap)=>{
      const fresh = snap.val();
      if(getRouteFromHash() === "owner" && state.authed) return;
      if(fresh && fresh !== state.about){ state.about = fresh; render(); }
    });
  }
})();
